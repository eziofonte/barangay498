<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard — System Prof Elect</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; }

        /* Navbar */
        .navbar {
            background: #1a1a2e;
            color: white;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar h1 { font-size: 18px; }
        .navbar a {
            color: #aaa;
            text-decoration: none;
            font-size: 14px;
        }
        .navbar a:hover { color: white; }

        /* Main content */
        .container { padding: 32px; }
        .welcome {
            margin-bottom: 24px;
            color: #333;
        }
        .welcome h2 { font-size: 22px; }
        .welcome p { color: #666; font-size: 14px; margin-top: 4px; }

        /* Cards */
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        .card {
            background: white;
            border-radius: 10px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.07);
            text-align: center;
        }
        .card h3 { font-size: 32px; color: #1a1a2e; }
        .card p { color: #666; font-size: 14px; margin-top: 6px; }

        /* Action buttons */
        .actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }
        .action-btn {
            background: white;
            border: 2px solid #1a1a2e;
            border-radius: 10px;
            padding: 24px;
            text-align: center;
            text-decoration: none;
            color: #1a1a2e;
            font-size: 15px;
            font-weight: bold;
            transition: all 0.2s;
        }
        .action-btn:hover {
            background: #1a1a2e;
            color: white;
        }
        .action-btn span {
            display: block;
            font-size: 28px;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <h1>⚡ System Prof Elect</h1>
        <a href="/logout">Logout</a>
    </div>

    <div class="container">
        <div class="welcome">
            <h2>Welcome, {{ current_user.name }}!</h2>
            <p>Barangay Senior Citizens Management System</p>
        </div>

        <!-- Stats -->
        <div class="cards">
            <div class="card">
                <h3>{{ senior_count }}</h3>
                <p>Registered Seniors</p>
            </div>
            <div class="card">
                <h3>{{ transaction_count }}</h3>
                <p>Total Transactions</p>
            </div>
        </div>

        <!-- Quick Actions -->
        <div class="actions">
            <a href="/scan" class="action-btn">
                <span>📷</span>
                Scan Senior Face
            </a>
            <a href="/seniors" class="action-btn">
                <span>👴</span>
                View All Seniors
            </a>
            <a href="/register-senior" class="action-btn">
                <span>➕</span>
                Register New Senior
            </a>
            <a href="/history" class="action-btn">
                <span>📋</span>
                Transaction History
            </a>
        </div>
    </div>

</body>
</html>
