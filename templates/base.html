<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}System Prof Elect{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/main.css">
    {% block extra_styles %}{% endblock %}
</head>
<body>
    <div class="navbar">
        <div class="navbar-brand">
            <!-- Replace logo-placeholder with: <img class="brand-logo" src="/static/img/logo.png" alt="Logo"> -->
            <div class="logo-placeholder">LOGO</div>
            <div>
                <h1>System Prof Elect</h1>
                <p>Barangay Senior Citizens Management</p>
            </div>
        </div>
        {% if current_user.is_authenticated %}
        <div class="navbar-right">
            <div class="user-info">
                <!-- Replace avatar-placeholder with: <img src="/static/img/avatar.png" alt="User"> -->
                <div class="avatar-placeholder">USER</div>
                <span>{{ current_user.name }}</span>
            </div>
            <a href="/logout">Logout</a>
        </div>
        {% endif %}
    </div>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    {% block scripts %}{% endblock %}
</body>
</html>
